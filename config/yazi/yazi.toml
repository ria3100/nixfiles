# yazi 基本設定

[mgr]
ratio = [ 1, 3, 0 ]
show_tab_bar = "never"
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "none"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*/"
run = "git"

[preview]
# プレビュー設定
max_width = 1000
max_height = 1000
cache_dir = ""

# 画像プレビュー（iTerm2/Kittyなどで有効）
image_quality = 75

[opener]
edit = [
  { run = 'nvim-remote "$@"', for = "unix" },
  { run = 'nvim "$@"', block = true, for = "unix", desc = "nvim (standalone)" },
]
open = [
  { run = 'open "$@"', for = "macos" },
]
reveal = [
  { run = 'open -R "$@"', for = "macos" },
]

[open]
rules = [
  { name = "*/", use = [ "edit", "open", "reveal" ] },

  { mime = "text/*", use = [ "edit", "reveal" ] },
  { mime = "image/*", use = [ "open", "reveal" ] },
  { mime = "video/*", use = [ "open", "reveal" ] },
  { mime = "audio/*", use = [ "open", "reveal" ] },
  { mime = "inode/x-empty", use = [ "edit", "reveal" ] },

  { mime = "application/json", use = [ "edit", "reveal" ] },
  { mime = "*/javascript", use = [ "edit", "reveal" ] },
  { mime = "*/xml", use = [ "edit", "reveal" ] },

  { mime = "application/zip", use = [ "open", "reveal" ] },
  { mime = "application/gzip", use = [ "open", "reveal" ] },

  { name = "*", use = [ "open", "reveal" ] },
]
